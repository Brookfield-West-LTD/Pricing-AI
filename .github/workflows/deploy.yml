name: Deploy Pricing AI

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 342797568006.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/pricing-ai-api:latest \
            .
          docker push $ECR_REGISTRY/pricing-ai-api:latest

      - name: Build and push web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://pricingai.metcoredigitech.com \
            --build-arg NEXT_PUBLIC_API_URL=https://pricingai.metcoredigitech.com/nest \
            -f apps/web/Dockerfile \
            -t $ECR_REGISTRY/pricing-ai-web:latest \
            .
          docker push $ECR_REGISTRY/pricing-ai-web:latest

      - name: Deploy to Lightsail
        run: |
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Write ECR credentials to server so deploy.sh can authenticate
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@35.158.12.74 \
            "sudo mkdir -p /root/.aws && printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\nregion = eu-central-1\n' '${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}' '${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}' | sudo tee /root/.aws/credentials > /dev/null && sudo chmod 600 /root/.aws/credentials"
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ubuntu@35.158.12.74 \
            "sudo /opt/pricing-ai/deploy.sh"
          rm -f /tmp/deploy_key
