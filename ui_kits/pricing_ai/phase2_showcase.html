<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pricing AI — Phase 2 · Adaptive Priority</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="ui_kit.css"/>
<link rel="stylesheet" href="motion.css"/>
<link rel="stylesheet" href="pria.css"/>
<link rel="stylesheet" href="phase2.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--vh-surface-000); color: var(--vh-text-000); min-height: 100vh; }
</style>
</head>
<body class="vh-atmosphere">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shaders.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pria.jsx"></script>
<script type="text/babel" src="phase2.jsx"></script>

<script type="text/babel">
const {
  P2_RevealCostFirst, P2_RevealReliabilityFirst, P2_RevealSustainFirst,
  P2_RevealInteractive, P2_PriorityMicrostep,
  DesignCanvas, DCSection, DCArtboard,
} = window;

function Showcase() {
  return (
    <DesignCanvas>
      <DCSection
        id="phase-2-intro"
        title="Phase 2 — Adaptive priority on reveal"
        subtitle="Same plan. Same numbers. Different order. Three variants, one micro-step, one pill that re-ranks live."
      >
        <DCArtboard id="microstep" label="Priority micro-step · picked just before the reveal, or inferred" width={960} height={620}>
          <P2_PriorityMicrostep/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="phase-2-three"
        title="Three reveal variants"
        subtitle="Cost-first leads with 20-yr savings in voltage. Reliability-first leads with hours of autonomy and a day/night ring. Sustainability-first leads with tonnes of CO₂ in a soft bio aura. Notice the eyebrow, the hero number, the first support card, and the copy line change — everything else holds still."
      >
        <DCArtboard id="cost-first"        label="A · Cost-first · 20-yr savings hero"                 width={820} height={820}>
          <P2_RevealCostFirst/>
        </DCArtboard>
        <DCArtboard id="reliability-first" label="B · Reliability-first · hours + day/night ring"      width={820} height={820}>
          <P2_RevealReliabilityFirst/>
        </DCArtboard>
        <DCArtboard id="sustain-first"     label="C · Sustainability-first · tonnes of CO₂ · bio aura" width={820} height={820}>
          <P2_RevealSustainFirst/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="phase-2-live"
        title="Change what matters most — live"
        subtitle="Tap the pill, pick a different priority. The reveal re-animates: the hero number crossfades, metric cards slide into their new positions with the base 480ms transition. No jumping."
      >
        <DCArtboard id="interactive" label="Live · click 'change what matters most' and pick a rank" width={820} height={820}>
          <P2_RevealInteractive start="cost"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Showcase/>);
</script>
</body>
</html>
