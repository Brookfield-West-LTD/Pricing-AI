<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--vh-surface-000); min-height: 100vh; display: grid; gap: 16px; align-content: center; }
  .row { display: flex; gap: 12px; align-items: center; }
  .label { font-family: var(--vh-font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--vh-text-200); min-width: 84px; }

  .btn {
    font-family: var(--vh-font-body); font-weight: 600; font-size: 14px;
    letter-spacing: -0.005em; padding: 14px 22px; border-radius: 999px;
    border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
    transition: all 180ms cubic-bezier(.2,.7,.2,1);
  }
  .btn .arrow { font-family: var(--vh-font-mono); font-size: 12px; letter-spacing: 0; }
  .btn-primary {
    background: linear-gradient(180deg, var(--vh-voltage-hot) 0%, var(--vh-voltage) 55%, var(--vh-voltage-deep) 100%);
    color: var(--vh-void);
    box-shadow: 0 1px 0 rgba(255,255,255,.25) inset, 0 10px 28px -8px rgba(255,107,53,.55);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,.3) inset, 0 14px 34px -8px rgba(255,107,53,.7); }
  .btn-secondary {
    background: var(--vh-surface-200); color: var(--vh-text-000);
    border-color: var(--vh-line);
  }
  .btn-ghost {
    background: transparent; color: var(--vh-text-100);
    border-color: transparent;
  }
  .btn-ghost:hover { color: var(--vh-text-000); }

  .input-row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field {
    background: var(--vh-surface-100); border: 1px solid var(--vh-line);
    border-radius: var(--vh-r-md); padding: 12px 14px;
  }
  .field.active {
    border-color: var(--vh-voltage);
    box-shadow: 0 0 0 3px rgba(255,107,53,.18);
  }
  .field-label { font-family: var(--vh-font-mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--vh-text-300); }
  .field-value { font-family: var(--vh-font-body); font-size: 15px; color: var(--vh-text-000); margin-top: 4px; }
  .field.active .field-value { color: var(--vh-text-000); }
  .caret { display: inline-block; width: 1px; height: 15px; background: var(--vh-voltage); margin-left: 2px; vertical-align: -2px; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style></head>
<body class="vh-atmosphere">
  <div class="row">
    <div class="label">BUTTONS</div>
    <button class="btn btn-primary">Continue <span class="arrow">→</span></button>
    <button class="btn btn-secondary">Back</button>
    <button class="btn btn-ghost">Skip for now</button>
  </div>
  <div class="row">
    <div class="label">FIELDS</div>
    <div class="input-row" style="flex:1;">
      <div class="field">
        <div class="field-label">POSTCODE / LGA</div>
        <div class="field-value">Lekki Phase 1<span class="caret"></span></div>
      </div>
      <div class="field active">
        <div class="field-label">AVG. DAILY LOAD</div>
        <div class="field-value">6.2 <span style="color: var(--vh-text-300); font-family: var(--vh-font-mono); font-size: 12px;">kWh</span></div>
      </div>
    </div>
  </div>
</body></html>
