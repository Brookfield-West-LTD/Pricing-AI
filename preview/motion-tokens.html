<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--vh-surface-000); min-height: 100vh; }
  .tokens { background: var(--vh-surface-100); border: 1px solid var(--vh-line); border-radius: var(--vh-r-lg); overflow: hidden; }
  .row { display: grid; grid-template-columns: 1fr 1.8fr 1fr 1.3fr; padding: 12px 18px; border-bottom: 1px solid var(--vh-line); font-size: 12px; color: var(--vh-text-100); align-items: center; }
  .row:last-child { border-bottom: none; }
  .row.head { background: var(--vh-surface-200); font-family: var(--vh-font-mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--vh-text-200); }
  code { font-family: var(--vh-font-mono); font-size: 11px; color: var(--vh-voltage-hot); }
  .k { font-family: var(--vh-font-mono); color: var(--vh-text-000); font-size: 11px; letter-spacing: .05em; }
</style></head>
<body class="vh-atmosphere">
  <div class="tokens">
    <div class="row head"><span>Token</span><span>Value</span><span>Use</span><span>Rule</span></div>
    <div class="row"><span class="k">fast</span><code>180ms · (.2,.7,.2,1)</code><span>Hover · Focus</span><span>Never longer than a blink</span></div>
    <div class="row"><span class="k">base</span><code>320ms · (.2,.7,.2,1)</code><span>Step transitions</span><span>Default move</span></div>
    <div class="row"><span class="k">slow</span><code>560ms · (.16,1,.3,1)</code><span>Hero reveals</span><span>First paint only</span></div>
    <div class="row"><span class="k">stagger</span><code>80ms / child</code><span>Assembling lists</span><span>Max 8 items</span></div>
    <div class="row"><span class="k">pulse</span><code>1800ms ease-out ∞</code><span>Live indicators</span><span>One per viewport</span></div>
  </div>
</body></html>
